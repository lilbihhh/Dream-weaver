{% extends "base.html" %}
{% block title %}Record · DreamWeaver N1{% endblock %}
{% block content %}
<section class="panel">
  <h1>Record Dream</h1>
  <form method="post" class="form">
    <label>Title
      <input name="title" required maxlength="120" placeholder="Flying over the coast">
    </label>
    <label>Intention
      <textarea name="intention" required rows="3" placeholder="Tonight I will recognise I am dreaming."></textarea>
    </label>
    <label>Scene (for playback)
      <textarea name="scene" rows="4" placeholder="Describe the vivid dreamscape to replay."></textarea>
    </label>
    <button class="btn" type="submit">Save Dream</button>
  </form>
</section>
{% endblock %}
